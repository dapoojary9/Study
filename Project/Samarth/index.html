<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Clone - Code Baithak</title>
    <!-- google font link -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <!-- style sheet link -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <header>
        <nav>
            <a href="">
                <img width="100" src="./assets/amazon_logo.png" alt="">
            </a>
            <div class="nav-location">
                <img height="20" src="./assets/location_icon.png" alt="">
                <div>
                    <p>Deliver to</p>
                    <h1>Delhi, INDIA</h1>
                </div>
            </div>
            <div class="nav-search">
                <div class="nav-search-category">
                    <p>All</p>
                    <img height="12" src="./assets/dropdown_icon.png" alt="">
                </div>
                <input class="nav-search-input" placeholder="Search items" type="text">
                <img class="nav-search-icon" src="./assets/search_icon.png" alt="">
            </div>

            <div class="nav-language">
                <img width="25" src="./assets/us_flag.png" alt="">
                <p>IN</p>
                <img width="8" src="./assets/dropdown_icon.png" alt="">
            </div>
            <!-- signin -->
             <div class="nav-text">
                <p>Hello, Singin</p>
                <h1>Accounts & List
                    <img height="8" src="./assets/dropdown_icon.png" alt="">
                </h1>
             </div>
             <!-- return -->
             <div class="nav-text">
                <p>Return</p>
                <h1> & Orderd</h1>
             </div>
             <!-- cart -->
              <a href="" class="nav-cart">
                <img width="35" src="./assets/cart_icon.png" alt="">
                <h4>Cart</h4>
              </a>

            </nav>
              <!-- bottom nav -->
               <div class="nav-bottom">
                    <div>
                        <img width="25" src="./assets/menu_icon.png" alt="">
                        <p>All</p>
                    </div>
                    <p>Today's Deal</p>
                    <p>MX Player</p>
                    <p>Registry</p>
                    <p>Customer Service</p>
                    <p>Sell</p>
               </div>

    </header>

    <main>
        <div class="main-slider">
            <a class="control-prev" href="#">&#8249;</a>
            <a class="control-next" href="#">&#8250;</a>
            <ul>
                <img class="slider-img" src="./assets/header1.jpg" alt="">
                <img class="slider-img" src="./assets/header2.jpg" alt="">
                <img class="slider-img" src="./assets/header3.jpg" alt="">
                <img class="slider-img" src="./assets/header4.jpg" alt="">
                <img class="slider-img" src="./assets/header5.jpg" alt="">
                <img class="slider-img" src="./assets/header6.jpg" alt="">
            </ul>
        </div>
    </main>
    <footer></footer>


    <script src="app.js"></script>
</body>
</html>
